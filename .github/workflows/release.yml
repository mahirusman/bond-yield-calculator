name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to create, for example v1.2.3
        required: true
        type: string
      prerelease:
        description: Mark the release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generateReleaseNotes: true
          prerelease: ${{ inputs.prerelease }}
