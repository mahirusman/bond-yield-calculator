services:
  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
    ports:
      - '3001:3001'

  frontend:
    build:
      context: .
      dockerfile: app/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api/v1}
    ports:
      - '8080:80'

  cms:
    build:
      context: ./app/cms
      dockerfile: Dockerfile
      args:
        SANITY_STUDIO_PROJECT_ID: ${SANITY_STUDIO_PROJECT_ID:-demo}
        SANITY_STUDIO_DATASET: ${SANITY_STUDIO_DATASET:-production}
    environment:
      SANITY_STUDIO_PROJECT_ID: ${SANITY_STUDIO_PROJECT_ID:-demo}
      SANITY_STUDIO_DATASET: ${SANITY_STUDIO_DATASET:-production}
      SANITY_STUDIO_HOST: ${SANITY_STUDIO_HOST:-bond-yield-calculator-cms}
    ports:
      - '3333:80'
