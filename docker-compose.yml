services:
  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: http://localhost:8080
    ports:
      - '3001:3001'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3001/health'').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: app/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '8080:80'

  cms:
    build:
      context: ./app/cms
      dockerfile: Dockerfile
      args:
        SANITY_STUDIO_PROJECT_ID: ${SANITY_STUDIO_PROJECT_ID:-demo}
        SANITY_STUDIO_DATASET: ${SANITY_STUDIO_DATASET:-production}
    environment:
      SANITY_STUDIO_PROJECT_ID: ${SANITY_STUDIO_PROJECT_ID:-demo}
      SANITY_STUDIO_DATASET: ${SANITY_STUDIO_DATASET:-production}
      SANITY_STUDIO_HOST: ${SANITY_STUDIO_HOST:-bond-yield-calculator-cms}
    ports:
      - '3333:80'
